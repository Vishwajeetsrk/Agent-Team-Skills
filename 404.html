<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Page Not Found · Agent Team Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6f6f7;--surface:#fff;--fg:#18181b;--muted:#71717a;--border:#e4e4e7;--accent:#4f46e5;--a2:#818cf8;--fd:'Space Grotesk',sans-serif;--fb:'DM Sans',sans-serif;--c:600px}
body{font-family:var(--fb);background:var(--bg);color:var(--fg);line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.c{max-width:var(--c);text-align:center}
.ill{width:180px;height:180px;margin:0 auto 20px}
h1{font-family:var(--fd);font-size:72px;font-weight:700;letter-spacing:-.04em;background:linear-gradient(135deg,var(--accent),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:8px}
h2{font-family:var(--fd);font-size:22px;font-weight:600;margin-bottom:12px;color:var(--fg)}
p{color:var(--muted);font-size:15px;margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto}
a{display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;text-decoration:none;font-size:15px;transition:all .2s}
a:hover{background:var(--a2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(79,70,229,.15)}
@media(max-width:480px){h1{font-size:48px}.ill{width:140px;height:140px}}
</style>
</head>
<body>
<div class="c">
  <div class="ill">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="12" r="5.5" opacity=".4"/>
      <circle cx="15" cy="12" r="5.5" opacity=".4"/>
      <line x1="9" y1="12" x2="15" y2="12" opacity=".4"/>
      <path d="M9 8.5a5.5 5.5 0 0 1 6 0" opacity=".4"/>
      <path d="M9 15.5a5.5 5.5 0 0 0 6 0" opacity=".4"/>
      <circle cx="9" cy="12" r="5.5" stroke-dasharray="10 20" stroke-width="2.5" stroke="var(--a2)"/>
      <circle cx="15" cy="12" r="5.5" stroke-dasharray="8 24" stroke-width="2.5" stroke="var(--a2)"/>
      <text x="12" y="16" text-anchor="middle" fill="var(--accent)" font-family="var(--fd)" font-size="4" font-weight="700">?</text>
    </svg>
  </div>
  <h1>404</h1>
  <h2>This page drifted off</h2>
  <p>The link you followed doesn't exist — or the agent team hasn't built it yet.</p>
  <a href="dashboard/index.html">&larr; Back to Dashboard</a>
</div>
</body>
</html>
